<div id="search-modal" class="modal">
    <div class="modal-content">
        <input type="text" id="search-input" placeholder="🚀 Search for a blog post...">
        <span class="close">&times;</span>
        <ul id="search-results"></ul>
    </div>
</div>
<script>
     if (!localStorage.getItem('store')) {
        // Template to generate the JSON to search
        window.store = {
          {% for post in site.posts %}
            "{{ post.url | slugify }}": {
              "title": "{{ post.title | xml_escape }}",
              "date":  {{ post.date | date: "%b %-d, %Y" | jsonify}},
              "author": "{{ post.author | xml_escape }}",
              "category": "{{ post.category | xml_escape }}",
              "content": {{ post.content | strip_html | jsonify }},
              "url": "{{ post.url | xml_escape }}"
            }
            {% unless forloop.last %},{% endunless %}
          {% endfor %}
        };
        console.log('Store created:', window.store);

        // Save window.store to local storage
        localStorage.setItem('store', JSON.stringify(window.store));
        console.log('Store saved to local storage:', window.store);
    }
</script>
  
  <!-- Import lunr.js from unpkg.com -->
<script src="https://unpkg.com/lunr/lunr.js"></script>
<script src="/assets/js/search.js"></script>
<script src="/assets/js/modal.js"></script>
